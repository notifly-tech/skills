skill:
  folder_name: 'event-helper'
  name: 'notifly-event-helper'
  display_name: '이벤트 헬퍼'
  short_description: '이벤트 트래킹 코드 생성'
  description: >
    개발자가 Notifly 이벤트를 올바르게 트래킹하도록 코드 스니펫을 생성합니다.
    플랫폼별 trackEvent 메서드 시그니처는 notifly-mcp-server에서 확인합니다.
  user_invocable: true

triggers:
  - '이벤트 트래킹 코드를 만들어줘'
  - 'trackEvent를 어떻게 써요?'
  - '커스텀 이벤트를 추가하고 싶어요'

inputs:
  - '이벤트 이름 (예: "purchase_completed")'
  - '플랫폼 (iOS/Android/Flutter/React Native/Web)'
  - '이벤트 속성 (선택)'

outputs:
  - '플랫폼별 trackEvent 호출 코드'
  - '이벤트 명명 규칙 체크리스트'

guardrails:
  - 'MCP-first: trackEvent 시그니처는 notifly-mcp-server:search_sdk로만 확인'
  - '개인정보 금지: 예시에 실제 사용자 데이터를 포함하지 않기'
  - '이벤트 이름은 snake_case 권장'

files_to_generate:
  skill_md: true
  references:
    - 'event-naming-conventions.md'
    - 'common-event-properties.md'
  scripts:
    - 'validate-event-code.sh'
  examples:
    - 'sample-events.json'

notes: >
  이 스킬은 의도적으로 단순하게 유지합니다. 이벤트 트래킹 "코드 생성"에만 집중하고,
  이벤트 기반 캠페인 설정이나 복잡한 이벤트 설계는 다루지 않습니다.

  기존 스킬과의 차별점:
  - notifly-integration: SDK 초기화 + 전체 통합
  - notifly-event-helper: 이벤트 트래킹 코드 생성만
