name: Release Verification Pipeline

on:
  workflow_run:
    workflows: ['Release to NPM']
    types: [completed]

concurrency:
  group: release-verification-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify published npm package
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code (same commit as release)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Wait for npm propagation (latest == this version)
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_VERSION="$(node -p "require('./package.json').version")"
          echo "Expected version from repo: ${EXPECTED_VERSION}"

          # NPM publish can take time to propagate. Retry a few times before failing.
          # This checks the package "latest" dist-tag.
          for i in {1..12}; do
            PUBLISHED_VERSION="$(npm view notifly-agent-skills@latest version 2>/dev/null || true)"
            echo "Attempt ${i}: npm latest version = '${PUBLISHED_VERSION}'"
            if [ "${PUBLISHED_VERSION}" = "${EXPECTED_VERSION}" ]; then
              echo "NPM propagation OK."
              exit 0
            fi
            sleep 10
          done

          echo "Timed out waiting for npm to show latest=${EXPECTED_VERSION}"
          echo "Last seen: '${PUBLISHED_VERSION}'"
          exit 1

      - name: Run released-package smoke tests (npx @latest)
        env:
          # Reduce noise / prevent slow audit/fund messages
          npm_config_fund: 'false'
          npm_config_audit: 'false'
          npm_config_update_notifier: 'false'
        run: npm run test:released
